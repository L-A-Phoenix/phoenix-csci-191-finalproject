<!doctype html>
<!-- Creates a Home Page -->

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./scripts/index-script.js" defer></script>
    <link rel="stylesheet" href="./styles/index-style.css" />
    <title>Home</title>
  </head>
  <body>
    <dialog id="project-modal">
      <button type="button" id="modal-close">Close</button>
      <h2 id="modal-title"></h2>
      <p id="modal-details"></p>
      <a id="modal-link"></a>
    </dialog>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="page-header">
      <nav aria-label="primary-navigation">
        <ul id="header-links">
          <li><a href="./" aria-current="page">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#skills">Skills</a></li>
          <li><a href="#contact">Contact</a></li>
          <li><a href="#resume">Resume</a></li>
        </ul>
      </nav>
      <button id="theme-toggle" type="button" aria-label="Theme Toggle">
        🌙
      </button>
    </header>
    <main id="main-content">
      <section id="hero">
        <h2 class="central-text">Lorenzo Phoenix</h2>
        <p>Programmer. Designer. Pianist.</p>
        <button>Personal E-Portfolio</button>
      </section>
      <article id="about">
        <h2>About Me</h2>
        <p></p>
      </article>
      <article id="projects">
        <h2>My Projects</h2>
        <ul id="project-list">
          <li>
            <article>
              <button type="button" class="project-card" data-index="0">
                <img src="./images/project1-icon.png" alt="Project 1 Icon" />
                <h2>Aim Trainer</h2>
              </button>
            </article>
          </li>
          <li>
            <article>
              <button type="button" class="project-card" data-index="1">
                <img src="./images/project2-icon.png" alt="Project 2 Icon" />
                <h2>Encryption</h2>
              </button>
            </article>
          </li>
          <li>
            <article>
              <button type="button" class="project-card" data-index="2">
                <img src="./images/project3-icon.png" alt="Project 3 Icon" />
                <h2>Roblox</h2>
              </button>
            </article>
          </li>
        </ul>
      </article>
      <article id="skills">
        <h2>My Skills</h2>
      </article>
      <article id="contact">
        <h2>Contact Me</h2>
      </article>
      <article id="resume">
        <h2>Resume</h2>
      </article>
    </main>
  </body>
</html>
